<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预盐优农 | 智慧农业入口</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Microsoft YaHei', sans-serif; background-color: #001529; overflow: hidden; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .content { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 25px; 
            border: 1px dotted rgba(79, 172, 254, 0.3);
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
        }

        h1 { font-size: 26px; margin: 0 0 10px 0; background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { font-size: 14px; opacity: 0.8; margin-bottom: 30px; letter-spacing: 1px; }

        /* 主按钮：跳转到你原本的官网 */
        .main-btn {
            display: inline-block;
            padding: 12px 35px;
            margin-bottom: 35px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        .main-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }

        .qr-wrapper { display: flex; gap: 20px; justify-content: center; }
        .qr-item { flex: 1; transition: 0.3s; }
        .qr-item:hover { transform: translateY(-8px); }
        .qr-item img { 
            width: 100%; 
            max-width: 140px; 
            border-radius: 12px; 
            background: white; 
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .label { margin-top: 12px; font-size: 13px; color: #4facfe; font-weight: 500; }

        .footer { margin-top: 35px; font-size: 11px; opacity: 0.4; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="content">
    <div class="card">
        <h1>预盐优农 | 智慧农业系统</h1>
        <div class="slogan">聚焦黄骅盐碱地 · 数字化治理闭环</div>

        <a href="main.html" class="main-btn">点击进入官方网站 →</a>

        <div class="qr-wrapper">
            <div class="qr-item">
                <img src="sys.png" alt="系统入口">
                <div class="label">系统演示入口</div>
            </div>
            <div class="qr-item">
                <img src="gzh.png" alt="公众号">
                <div class="label">关注官方资讯</div>
            </div>
        </div>

        <div class="footer">
            © 2026 预盐优农项目组 · 基于 GitHub Pages 部署<br>
            HTTPS // RXY2070576516-SOURCE.GITHUB.IO
        </div>
    </div>
</div>

<script>
    /* 粒子背景配置 */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 50 },
            "color": { "value": "#4facfe" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.4 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#4facfe", "opacity": 0.3, "width": 1 },
            "move": { "enable": true, "speed": 2 }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "grab" } }
        }
    });
</script>

</body>
</html>
