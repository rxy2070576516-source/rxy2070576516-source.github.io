<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预盐优农 - 智慧农业云端入口</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #001529; overflow: hidden; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .content { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 28px; margin-bottom: 5px; background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { font-size: 14px; opacity: 0.7; margin-bottom: 30px; letter-spacing: 1px; }

        /* 新增：进入官网主按钮 */
        .main-btn {
            display: inline-block;
            padding: 12px 30px;
            margin-bottom: 35px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            transition: all 0.3s;
        }
        .main-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }

        .qr-wrapper { display: flex; gap: 30px; justify-content: center; }
        .qr-item { transition: all 0.3s; cursor: pointer; }
        .qr-item:hover { transform: translateY(-10px); }
        .qr-item img { width: 130px; height: 130px; border-radius: 12px; border: 1px solid rgba(79, 172, 254, 0.3); }
        .label { margin-top: 10px; font-size: 12px; color: #4facfe; }

        .footer { margin-top: 30px; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="content">
    <div class="card">
        <h1>预盐优农 | 智慧农业实验室</h1>
        <div class="slogan">聚焦黄骅盐碱地 · 数字化决策入口</div>

        <a href="main.html" class="main-btn">点击进入官方网站 →</a>

        <div class="qr-wrapper">
            <div class="qr-item">
                <img src="sys.png" alt="系统入口">
                <div class="label">系统演示(GitHub)</div>
            </div>
            <div class="qr-item">
                <img src="gzh.png" alt="公众号">
                <div class="label">官方公众号</div>
            </div>
        </div>

        <div class="footer">
            POWERED BY GITHUB PAGES & PRE-SALT TEAM
        </div>
    </div>
</div>

<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60 },
            "color": { "value": "#4facfe" },
            "line_linked": { "enable": true, "color": "#4facfe", "opacity": 0.2 },
            "move": { "enable": true, "speed": 1.5 }
        }
    });
</script>

</body>
</html>
